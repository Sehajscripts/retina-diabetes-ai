<!DOCTYPE html>
<html>
<head>
    <title>AI Retinal Diagnostic</title>
    <script type="module" src="https://jsdelivr.net"></script>
    <link rel="stylesheet" href="https://jsdelivr.net" />
    <style>
        body { margin: 0; padding: 20px; background-color: #f7f9fa; font-family: sans-serif; }
        /* Professional loading spinner screen overlay */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1); width: 50px; height: 50px;
            border-radius: 50%; border-left-color: #0078FF;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { margin-top: 15px; color: #555; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>🔄 Booting Client-Side AI Machine Learning Engines... Please Wait</p>
    </div>

    <!-- The Gradio wrapper engine triggers a custom event when it finishes rendering -->
    <gradio-app src="https://raw.githubusercontent.com/Sehajscripts/retina-diabetes-ai/refs/heads/main/app.py" @render="document.getElementById('loader').style.opacity='0'; setTimeout(() => document.getElementById('loader').remove(), 500);"></gradio-app>
</body>
</html>

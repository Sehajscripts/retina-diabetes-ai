<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Class Retinal Diagnostics Interface</title>
    <!-- Explicit absolute asset pathways to completely bypass CDN root CORS tracking blocks -->
    <script type="module" src="https://unpkg.com"></script>
    <link rel="stylesheet" href="https://unpkg.com" />
  </head>
  <body>
    <!-- Engine Container -->
    <gradio-lite id="gradio-container">
<gradio-requirements>
pillow
</gradio-requirements>
    </gradio-lite>

    <script>
      async function loadExternalApp() {
        try {
          // Pulls your cleaned up code directly from app.py at runtime
          const response = await fetch('./app.py');
          if (!response.ok) throw new Error('Could not read your app.py asset.');
          
          const pythonCode = await response.text();
          const container = document.getElementById('gradio-container');
          
          const fileTag = document.createElement('gradio-file');
          fileTag.setAttribute('name', 'app.py');
          fileTag.setAttribute('entrypoint', '');
          fileTag.textContent = pythonCode;
          
          container.appendChild(fileTag);
        } catch (error) {
          console.error('App engine mounting failure:', error);
        }
      }
      loadExternalApp();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Class Retinal Diagnostics Interface</title>
    <!-- Using cdnjs to completely bypass the CORS and timeout blocks -->
    <script type="module" src="https://cloudflare.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com" />
  </head>
  <body>
    <gradio-lite id="gradio-container">
<gradio-requirements>
pillow
</gradio-requirements>
    </gradio-lite>

    <script>
      async function loadExternalApp() {
        try {
          const response = await fetch('./app.py');
          if (!response.ok) throw new Error('Could not find or load your app.py file.');
          
          let pythonCode = await response.text();
          
          // Smart cleaning: Automatically strips out the .launch() block so you don't have to touch app.py
          pythonCode = pythonCode.replace(/demo\.launch\([\s\S]*?\)/g, '');
          pythonCode += "\ndemo.queue()"; 
          
          const container = document.getElementById('gradio-container');
          const fileTag = document.createElement('gradio-file');
          fileTag.setAttribute('name', 'app.py');
          fileTag.setAttribute('entrypoint', '');
          fileTag.textContent = pythonCode;
          
          container.appendChild(fileTag);
        } catch (error) {
          console.error('Error mounting external file script:', error);
        }
      }
      loadExternalApp();
    </script>
  </body>
</html>

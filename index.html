<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Class Retinal Diagnostics Interface</title>
    <!-- Alternate stable CDN to fix connection timeout issues -->
    <script type="module" src="https://unpkg.com"></script>
    <link rel="stylesheet" href="https://unpkg.com" />
  </head>
  <body>
    <!-- Serverless container runtime execution environment -->
    <gradio-lite id="gradio-container">
<gradio-requirements>
pillow
</gradio-requirements>
    </gradio-lite>

    <script>
      async function loadExternalApp() {
        try {
          const response = await fetch('./app.py');
          if (!response.ok) throw new Error('Failed to fetch app.py profile from directory root.');
          
          let pythonCode = await response.text();
          
          // Clean up local production server hooks to make code compatible with WebAssembly environment
          pythonCode = pythonCode.replace(/demo\.launch\([\s\S]*?\)/g, 'demo.queue()');
          pythonCode = pythonCode.replace(/print\(f"🚀 Deploying Production Dashboard[\s\S]*?\)/g, 'pass');

          const container = document.getElementById('gradio-container');
          const fileTag = document.createElement('gradio-file');
          fileTag.setAttribute('name', 'app.py');
          fileTag.setAttribute('entrypoint', '');
          fileTag.textContent = pythonCode;
          
          container.appendChild(fileTag);
        } catch (error) {
          console.error('Critical deployment mounting exception:', error);
        }
      }
      loadExternalApp();
    </script>
  </body>
</html>
